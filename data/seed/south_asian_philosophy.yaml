  # ── Concepts ────────────────────────────────────────────────
  - type: Concept
    uid: "concept:pramana"
    label: "Pramana (Valid Means of Knowledge)"
    labels_i18n: {sa: "प्रमाण", ja: "量"}
    definition: "Valid means of knowledge: perception, inference, comparison, testimony."
    tradition_uids: ["tradition:nyaya"]
    keywords: ["epistemology", "knowledge", "perception", "inference"]

  - type: Concept
    uid: "concept:brahman"
    label: "Brahman"
    labels_i18n: {sa: "ब्रह्मन्", ja: "ブラフマン"}
    definition: "The ultimate reality, the ground of all being."
    tradition_uids: ["tradition:vedanta"]
    keywords: ["ultimate reality", "ground", "being", "absolute"]

  - type: Concept
    uid: "concept:atman"
    label: "Atman (Self)"
    labels_i18n: {sa: "आत्मन्", ja: "アートマン"}
    definition: "The true self, identical with Brahman in Advaita."
    tradition_uids: ["tradition:vedanta"]
    keywords: ["self", "soul", "consciousness"]

  - type: Concept
    uid: "concept:maya"
    label: "Maya (Illusion)"
    labels_i18n: {sa: "माया", ja: "マーヤー"}
    definition: "The cosmic power of illusion making Brahman appear as the manifold world."
    tradition_uids: ["tradition:advaita"]
    keywords: ["illusion", "appearance", "ignorance"]

  - type: Concept
    uid: "concept:karma"
    label: "Karma"
    labels_i18n: {sa: "कर्म", ja: "業", zh: "业"}
    definition: "The moral law of cause and effect. Actions produce consequences across lifetimes."
    tradition_uids: ["tradition:vedanta", "tradition:jainism"]
    keywords: ["action", "consequence", "moral law", "rebirth"]

  - type: Concept
    uid: "concept:moksha"
    label: "Moksha (Liberation)"
    labels_i18n: {sa: "मोक्ष", ja: "解脱"}
    definition: "Liberation from the cycle of birth and death."
    tradition_uids: ["tradition:vedanta"]
    keywords: ["liberation", "freedom", "realization"]

  - type: Concept
    uid: "concept:ahimsa"
    label: "Ahimsa (Non-Violence)"
    labels_i18n: {sa: "अहिंसा", ja: "不殺生"}
    definition: "Non-harm to any living being in thought, word, and deed."
    tradition_uids: ["tradition:jainism"]
    keywords: ["non-violence", "non-harm", "compassion"]

  - type: Concept
    uid: "concept:pratityasamutpada"
    label: "Pratityasamutpada (Dependent Origination)"
    labels_i18n: {sa: "प्रतीत्यसमुत्पाद", ja: "縁起", zh: "缘起"}
    definition: "All phenomena arise in dependence upon causes and conditions."
    tradition_uids: ["tradition:buddhism-madhyamaka"]
    keywords: ["dependent origination", "causation", "interconnection"]

  - type: Concept
    uid: "concept:vijnaptimatrata"
    label: "Vijnaptimatrata (Consciousness-Only)"
    labels_i18n: {sa: "विज्ञप्तिमात्रता", ja: "唯識", zh: "唯识"}
    definition: "All experienced phenomena are only consciousness. No external objects exist independently."
    tradition_uids: ["tradition:yogacara"]
    keywords: ["consciousness", "mind-only", "idealism"]

  - type: Concept
    uid: "concept:anekantavada"
    label: "Anekantavada (Many-Sidedness)"
    labels_i18n: {sa: "अनेकान्तवाद"}
    definition: "Reality is complex and can be perceived from multiple perspectives, none complete alone."
    tradition_uids: ["tradition:jainism"]
    keywords: ["pluralism", "perspectivism", "non-absolutism"]

