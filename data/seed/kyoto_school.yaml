      ja: "龍樹"
      zh: "龍樹"
    birth_year: 150
    death_year: 250
    tradition_uids: ["tradition:buddhism-madhyamaka"]
    external_ids:
      wikidata: "Q192885"

  # Concepts
  - type: Concept
    uid: "concept:basho"
    label: "Basho (Place)"
    labels_i18n:
      ja: "場所"
    definition: "Nishida's concept of 'place' as the self-determining locus of experience. The ultimate basho is absolute nothingness."
    tradition_uids: ["tradition:kyoto-school"]
    first_attested_year: 1926
    keywords: ["place", "topos", "nothingness", "self-awareness"]

  - type: Concept
    uid: "concept:zettai-mu"
    label: "Absolute Nothingness"
    labels_i18n:
      ja: "絶対無"
    definition: "The ultimate place that envelops all being without itself being determined. The ground prior to subject-object division."
    tradition_uids: ["tradition:kyoto-school"]
    first_attested_year: 1926
    keywords: ["nothingness", "mu", "absolute", "ground"]

  - type: Concept
    uid: "concept:aidagara"
    label: "Aidagara (Betweenness)"
    labels_i18n:
      ja: "間柄"
    definition: "The relational space between persons that constitutes their individuality."
    tradition_uids: ["tradition:kyoto-school"]
    first_attested_year: 1934
    keywords: ["betweenness", "relation", "ethics", "person"]

  - type: Concept
    uid: "concept:fudo"
    label: "Fudo (Climate/Milieu)"
    labels_i18n:
      ja: "風土"
    definition: "The climatic and cultural milieu that shapes human self-understanding. Not mere environment but the lived space of human existence."
    tradition_uids: ["tradition:kyoto-school"]
    first_attested_year: 1935
    keywords: ["climate", "milieu", "culture", "environment"]

  - type: Concept
    uid: "concept:sunyata"
    label: "Sunyata (Emptiness)"
    labels_i18n:
      sa: "śūnyatā"
      ja: "空"
      zh: "空"
    definition: "The emptiness of inherent existence. All phenomena arise dependently and lack self-nature."
    tradition_uids: ["tradition:buddhism-madhyamaka"]
    first_attested_year: -150
    keywords: ["emptiness", "dependent origination", "no-self"]

  - type: Concept
    uid: "concept:dasein"
    label: "Dasein"
    labels_i18n:
      de: "Dasein"
      ja: "現存在"
    definition: "The being that understands Being. Human existence as being-in-the-world."
    tradition_uids: ["tradition:continental-phenomenology"]
    first_attested_year: 1927
    keywords: ["being", "existence", "understanding", "world"]

  - type: Concept
    uid: "concept:lichtung"
    label: "Lichtung (Clearing)"
    labels_i18n:
      de: "Lichtung"
      ja: "開け"
    definition: "The open region in which beings can show themselves and withdraw."
    tradition_uids: ["tradition:continental-phenomenology"]
    first_attested_year: 1964
    keywords: ["clearing", "openness", "truth", "unconcealment"]

  # Texts
  - type: Text
