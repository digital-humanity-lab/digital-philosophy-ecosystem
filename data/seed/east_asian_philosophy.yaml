  # ── Concepts ────────────────────────────────────────────────
  - type: Concept
    uid: "concept:ren"
    label: "Ren (Benevolence)"
    labels_i18n: {zh: "仁", ja: "仁", ko: "인"}
    definition: "The central virtue of Confucian ethics: benevolence, humaneness."
    tradition_uids: ["tradition:confucianism"]
    first_attested_year: -500
    keywords: ["virtue", "benevolence", "humaneness", "love"]

  - type: Concept
    uid: "concept:li-ritual"
    label: "Li (Ritual Propriety)"
    labels_i18n: {zh: "禮", ja: "礼", ko: "예"}
    definition: "Ritual propriety, ceremony, and the normative patterns of social life."
    tradition_uids: ["tradition:confucianism"]
    keywords: ["ritual", "propriety", "ceremony", "social order"]

  - type: Concept
    uid: "concept:yi"
    label: "Yi (Righteousness)"
    labels_i18n: {zh: "義", ja: "義", ko: "의"}
    definition: "Righteousness, moral rightness, duty-bound action."
    tradition_uids: ["tradition:confucianism"]
    keywords: ["righteousness", "duty", "justice"]

  - type: Concept
    uid: "concept:xing"
    label: "Xing (Human Nature)"
    labels_i18n: {zh: "性", ja: "性"}
    definition: "Human nature. Mencius: innately good. Xunzi: innately inclined to profit."
    tradition_uids: ["tradition:confucianism"]
    keywords: ["nature", "goodness", "human"]

  - type: Concept
    uid: "concept:dao"
    label: "Dao (The Way)"
    labels_i18n: {zh: "道", ja: "道", ko: "도"}
    definition: "The Way, the source and pattern of all things. Dao that can be spoken is not the constant Dao."
    tradition_uids: ["tradition:daoism"]
    first_attested_year: -600
    keywords: ["way", "cosmic order", "nameless"]

  - type: Concept
    uid: "concept:wuwei"
    label: "Wuwei (Non-Action)"
    labels_i18n: {zh: "無為", ja: "無為"}
    definition: "Effortless action aligned with nature. Acting without forcing."
    tradition_uids: ["tradition:daoism"]
    keywords: ["non-action", "effortless", "spontaneous", "natural"]

  - type: Concept
    uid: "concept:qi"
    label: "Qi (Vital Force)"
    labels_i18n: {zh: "気", ja: "気", ko: "기"}
    definition: "Vital force or material energy constituting all things."
    tradition_uids: ["tradition:neo-confucianism"]
    keywords: ["vital force", "energy", "matter"]

  - type: Concept
    uid: "concept:li-principle"
    label: "Li (Principle)"
    labels_i18n: {zh: "理", ja: "理", ko: "리"}
    definition: "The principle or pattern inherent in all things. Li precedes qi."
    tradition_uids: ["tradition:neo-confucianism"]
    first_attested_year: 1130
    keywords: ["principle", "pattern", "form", "order"]

  - type: Concept
    uid: "concept:liangzhi"
    label: "Liangzhi (Innate Knowledge)"
    labels_i18n: {zh: "良知", ja: "良知"}
    definition: "Innate moral knowledge. Wang Yangming: knowledge and action are one."
    tradition_uids: ["tradition:yangming"]
    keywords: ["innate knowledge", "conscience", "unity of knowledge and action"]

  - type: Concept
    uid: "concept:jian-ai"
    label: "Jian Ai (Universal Love)"
    labels_i18n: {zh: "兼爱", ja: "兼愛"}
    definition: "Universal, impartial love for all people without distinction."
    tradition_uids: ["tradition:mohism"]
    keywords: ["universal love", "impartial care"]

  - type: Concept
    uid: "concept:fa"
    label: "Fa (Law)"
    labels_i18n: {zh: "法", ja: "法"}
    definition: "Law as the instrument of governance. Impartial standards applied uniformly."
    tradition_uids: ["tradition:legalism"]
    keywords: ["law", "governance", "standards"]

  - type: Concept
    uid: "concept:wu-buddhist"
    label: "Wu/Mu (Nothingness)"
    labels_i18n: {zh: "無", ja: "無"}
    definition: "Nothingness, non-being. In Zen: the gateless gate, Joshu's Mu."
    tradition_uids: ["tradition:chan-zen"]
    keywords: ["nothingness", "emptiness", "mu", "koan"]

  - type: Concept
    uid: "concept:shinjin-datsuraku"
    label: "Shinjin Datsuraku (Dropping Body-Mind)"
    labels_i18n: {ja: "身心脱落"}
    definition: "Dogen's concept: dropping off body and mind in seated meditation."
    tradition_uids: ["tradition:chan-zen"]
    keywords: ["body-mind", "zazen", "enlightenment", "dropping"]

