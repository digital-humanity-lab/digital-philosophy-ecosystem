    labels_i18n:
      ja: "倫理学"
    author_uids: ["thinker:watsuji-tetsuro"]
    year: 1937
    language: "ja"

  - type: Text
    uid: "text:fudo"
    label: "Fudo: Wind and Earth"
    labels_i18n:
      ja: "風土"
    author_uids: ["thinker:watsuji-tetsuro"]
    year: 1935
    language: "ja"

  - type: Text
    uid: "text:religion-nothingness"
